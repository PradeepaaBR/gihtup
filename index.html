<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watermark Upload System</title>
<style>
body { font-family: Arial; text-align: center; background: #f4f4f4; }
.container { width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.2);}
h2 { color: #333; }
button { margin-top: 20px; padding: 10px 20px; border: none; background: #3498db; color: white; font-size: 16px; border-radius: 5px; cursor: pointer;}
button:hover { background: #2980b9;}
#status { margin-top: 20px; font-weight: bold;}
#preview img, #preview video { margin-top: 20px; max-width: 100%; display:block; margin:auto;}
</style>
</head>
<body>

<div class="container">
<h2>Upload Images / Videos</h2>
<input type="file" id="fileInput" multiple><br>
<button onclick="uploadFiles()">Upload</button>

<div id="status"></div>
<div id="preview"></div>
</div>

<script>
async function uploadFiles() {
    const files = document.getElementById("fileInput").files;
    const statusDiv = document.getElementById("status");
    const preview = document.getElementById("preview");
    preview.innerHTML = "";
    statusDiv.innerText = "";

    if (!files.length) { alert("Please select files"); return; }

    for (let file of files) {
        statusDiv.innerText = file.name + " → Uploading...";
        const formData = new FormData();
        formData.append("files", file);

        try {
            const res = await fetch("http://localhost:3000/api/upload", {
                method: "POST",
                body: formData
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);

            statusDiv.innerText = file.name + " → Processing...";
            await new Promise(r => setTimeout(r, 500));

            const fileURL = data.files[0];
            if(file.type.startsWith("image")) {
                const img = document.createElement("img");
                img.src = fileURL;
                preview.appendChild(img);
            } else if(file.type.startsWith("video")) {
                const video = document.createElement("video");
                video.src = fileURL;
                video.controls = true;
                preview.appendChild(video);
            }

            statusDiv.innerText = file.name + " → Done!";
        } catch(err) {
            console.error(err);
            statusDiv.innerText = file.name + " → Error uploading! Check server console.";
        }
    }
}
</script>

</body>
</html>
